// ─── Shared counter component ────────────────────────────────────────────────
function Counter({ target, prefix = '', suffix = '', started }) {
  const [count, setCount] = React.useState(0);
  React.useEffect(() => {
    if (!started) return;
    let current = 0;
    const steps = 60, duration = 2000;
    const timer = setInterval(() => {
      current += target / steps;
      if (current >= target) { setCount(target); clearInterval(timer); }
      else setCount(Math.floor(current));
    }, duration / steps);
    return () => clearInterval(timer);
  }, [started, target]);
  return <span>{prefix}{count}{suffix}</span>;
}

// Particle component for monogram hover
function CV3Particle({ id }) {
  const angle = (id / 10) * Math.PI * 2 + Math.random() * 0.8;
  const dist = 28 + Math.random() * 24;
  const dx = Math.cos(angle) * dist;
  const dy = Math.sin(angle) * dist;
  const size = 2 + Math.random() * 3;
  const delay = Math.random() * 0.3;
  const dur = 0.8 + Math.random() * 0.5;
  return (
    <div style={{
      position: 'absolute',
      left: '50%', top: '50%',
      width: size, height: size,
      borderRadius: '50%',
      background: '#16A34A',
      marginLeft: -size/2, marginTop: -size/2,
      pointerEvents: 'none',
      '--dx': `${dx}px`,
      '--dy': `${dy}px`,
      animation: `cv3ParticleDrift ${dur}s ease-out ${delay}s both`,
      opacity: 0,
    }} />
  );
}

function CV3Monogram() {
  const [hovered, setHovered] = React.useState(false);
  const [particles, setParticles] = React.useState([]);
  const intervalRef = React.useRef(null);
  const counterRef = React.useRef(0);

  const handleMouseEnter = () => {
    setHovered(true);
    intervalRef.current = setInterval(() => {
      counterRef.current += 1;
      const id = counterRef.current;
      setParticles(p => [...p.slice(-18), id]);
    }, 80);
  };

  const handleMouseLeave = () => {
    setHovered(false);
    clearInterval(intervalRef.current);
    setTimeout(() => setParticles([]), 900);
  };

  React.useEffect(() => () => clearInterval(intervalRef.current), []);

  return (
    <div
      onMouseEnter={handleMouseEnter}
      onMouseLeave={handleMouseLeave}
      style={{
        width: 76, height: 76, borderRadius: '50%',
        border: `2px solid ${hovered ? '#16A34A' : 'rgba(34,211,238,0.4)'}`,
        display: 'flex', alignItems: 'center', justifyContent: 'center',
        fontFamily: "'Outfit',sans-serif", fontSize: 24, fontWeight: 700,
        color: '#16A34A', cursor: 'default',
        background: hovered ? 'rgba(22,163,74,0.06)' : 'transparent',
        animation: hovered ? 'cv3GlowPulse 2s ease infinite' : 'none',
        transition: 'border-color .4s, background .4s',
        position: 'relative',
        flexShrink: 0,
        overflow: 'visible',
      }}
    >
      JM
      {particles.map(id => <CV3Particle key={id} id={id % 10} />)}
    </div>
  );
}

                      </div>
                      <div>
                        <span style={{ fontFamily:"'Outfit',sans-serif", fontSize:15, fontWeight:700, color:fg }}>{job.company}</span>
                        <span style={{ fontFamily:"'Outfit',sans-serif", fontSize:12, color:muted, marginLeft:11, fontWeight:300 }}>{job.role}</span>
                      </div>
                    </div>
                    <div style={{ display:'flex', alignItems:'center', gap:11 }}>
                      <span style={{ fontFamily:"'Outfit',sans-serif", fontSize:10, color:muted,
                        background: dark?'#181818':'#E8F5E8', padding:'3px 11px', borderRadius:20, fontWeight:400,
                        border:`1px solid ${div_}` }}>{job.period}</span>
                      <span style={{ color:accent, fontSize:13,
                        transform:open===job.id?'rotate(180deg)':'none',
                        transition:'transform .25s', display:'block' }}>▾</span>
                    </div>
                  </button>
                  {open===job.id && (
                    <div style={{ padding:'0 20px 18px', borderTop:'1px solid #1E1E1E',
                      background: dark ? 'linear-gradient(180deg, #0F0F0F 0%, #0A0A0A 100%)' : 'linear-gradient(180deg, #F5FBF5 0%, #F0FAF0 100%)' }}>
                      <ul style={{ listStyle:'none', paddingTop:13, display:'flex', flexDirection:'column', gap:9 }}>
                        {job.bullets.map((b,i)=>(
                          <li key={i} style={{ fontFamily:"'Outfit',sans-serif", fontSize:13,
                            color:muted, lineHeight:1.75, display:'flex', gap:11, fontWeight:300 }}>
                            <span style={{ color:accent, flexShrink:0, fontWeight:600 }}>—</span>{b}
                          </li>
                        ))}
                      </ul>
                    </div>
                  )}
                </div>
              ))}
            </div>
          </div>

          {/* Impact */}
          <div style={{ marginBottom:36, ...animStyle(0.42) }}>
            <h2 className="cv3-section-label">Impact</h2>
            <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:8 }}>
              {impact.map((item, i) => (
                <div key={item.label}
                  style={{
                    background: card,
                    border: `1px solid ${div_}`,
                    borderRadius: 8,
                    padding: '14px 16px',
                    transition: 'border-color .2s, transform .2s, box-shadow .2s',
                    cursor: 'default',
                    gridColumn: impact.length % 2 !== 0 && i === impact.length - 1 ? 'span 2' : 'span 1',
                  }}
                  onMouseEnter={e => {
                    e.currentTarget.style.borderColor = accent + '44';
                    e.currentTarget.style.transform = 'translateY(-2px)';
                    e.currentTarget.style.boxShadow = `0 6px 24px rgba(22,163,74,0.08)`;
                  }}
                  onMouseLeave={e => {
                    e.currentTarget.style.borderColor = div_;
                    e.currentTarget.style.transform = 'none';
                    e.currentTarget.style.boxShadow = 'none';
                  }}>
                  <div style={{
                    fontFamily:"'Outfit',sans-serif", fontSize:10, fontWeight:700,
                    color:accent, letterSpacing:'0.12em', textTransform:'uppercase', marginBottom:7,
                  }}>{item.label}</div>
                  <div style={{
                    fontFamily:"'Outfit',sans-serif", fontSize:12, color:muted,
                    lineHeight:1.75, fontWeight:300,
                  }}>{item.text}</div>
                </div>
              ))}
            </div>
          </div>

          {/* Education */}
          <div style={{ ...animStyle(0.55) }}>
            <h2 className="cv3-section-label">Education</h2>
            <div style={{ background:card, border:`1px solid ${div_}`, borderRadius:8, padding:'17px 20px',
              transition:'border-color .2s' }}
              onMouseEnter={e=>e.currentTarget.style.borderColor=accent+'33'}
              onMouseLeave={e=>e.currentTarget.style.borderColor=div_}>
              <div style={{ fontFamily:"'Outfit',sans-serif", fontSize:14, fontWeight:700, color:fg }}>Oxford Brookes University</div>
              <div style={{ fontFamily:"'Outfit',sans-serif", fontSize:12, color:muted, marginTop:4, fontWeight:300 }}>BSc Honours — Software Engineering & History · 2010</div>
            </div>
          </div>
        </div>

        {/* Right sidebar */}
        <div className="cv3-right-sidebar" style={{ padding:'32px 28px', display:'flex', flexDirection:'column', gap:32,
          background: dark ? 'linear-gradient(180deg, #090909 0%, #080808 100%)' : 'linear-gradient(180deg, #F2FAF2 0%, #FAFFFE 100%)' }}>

          {/* Domain Expertise */}
          <div style={{ ...animStyle(0.38) }}>
            <h2 className="cv3-section-label">Domain Expertise</h2>
            <div style={{ display:'flex', flexDirection:'column', gap:11 }}>
              {[['Fintech','Tax, payment, remittance at scale'],
                ['E-commerce','Room selection, availability, demand'],
                ['Regulatory','DSA · CPC · CMA'],
                ['Experimentation','A/B at platform scale'],
                ['AI Native','Ideation & delivery acceleration']].map(([l,d],i)=>(
                <div key={l} style={{
                  paddingLeft:13,
                  borderLeft:`2px solid transparent`,
                  borderImage:`linear-gradient(180deg, ${accent}, #15803D) 1`,
                  transition:'opacity .2s',
                }} onMouseEnter={e=>e.currentTarget.style.opacity='0.8'}
                   onMouseLeave={e=>e.currentTarget.style.opacity='1'}>
                  <div style={{ fontFamily:"'Outfit',sans-serif", fontSize:12, fontWeight:600, color:fg }}>{l}</div>
                  <div style={{ fontFamily:"'Outfit',sans-serif", fontSize:11, color:muted, marginTop:2, fontWeight:300 }}>{d}</div>
                </div>
              ))}
            </div>
          </div>

          {/* Skills */}
          <div style={{ ...animStyle(0.28) }}>
            <h2 className="cv3-section-label">Skills</h2>
            <div style={{ display:'flex', flexWrap:'wrap', gap:6 }}>
              {skills.map(s=>(
                <span key={s} className="cv3-skill-tag"
                  style={{ fontFamily:"'Outfit',sans-serif", fontSize:11, padding:'4px 10px',
                    borderRadius:4, border:`1px solid ${div_}`, color:muted, cursor:'default', fontWeight:400,
                    background:'transparent' }}>
                  {s}
                </span>
              ))}
            </div>
          </div>

          {/* About */}
          <div style={{ ...animStyle(0.46) }}>
            <h2 className="cv3-section-label">About</h2>
            <div style={{ display:'flex', flexDirection:'column', gap:9 }}>
              {about.map((item,i)=>(
                <div key={i} style={{ fontFamily:"'Outfit',sans-serif", fontSize:12,
                  color:muted, display:'flex', gap:9, fontWeight:300,
                  transition:'color .18s', cursor:'default' }}
                  onMouseEnter={e=>e.currentTarget.style.color=fg}
                  onMouseLeave={e=>e.currentTarget.style.color=muted}>
                  <span style={{ color:accent, fontWeight:600, flexShrink:0 }}>·</span>{item}
                </div>
              ))}
            </div>
          </div>
        </div>
      </div>
    </div>
  );
}




function App() {
  return <CV3 />;
}
